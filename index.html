function tvBadge(tv){
  if(tv==="BBC") return'<span class="badge bbc">BBC / iPlayer</span>';
  if(tv==="ITV") return'<span class="badge itv">ITV / ITVX</span>';
  return'<span class="badge tbc">TBC</span>';
}
function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const stage=document.getElementById("stage").value;
  const tv=document.getElementById("tv").value;
  const rows=F.filter(x=>{
    if(q&&!x.f.toLowerCase().includes(q)&&!x.s.toLowerCase().includes(q)) return false;
    if(stage&&!x.s.includes(stage)) return false;
    if(tv&&x.tv!==tv) return false;
    return true;
  });
  const tb=document.getElementById("tbody");
  if(!rows.length){tb.innerHTML='<tr><td colspan="5" class="no-results">No fixtures match.</td></tr>';return;}
  tb.innerHTML=rows.map(x=>`<tr>
    <td>${x.d}</td><td>${x.t}</td>
    <td><span class="stage-pill">${x.s}</span></td>
    <td><span class="fixture">${x.f}</span>${x.r?'<span class="result">result</span>':''}</td>
    <td>${tvBadge(x.tv)}</td>
  </tr>`).join("");
}
